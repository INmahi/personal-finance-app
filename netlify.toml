# Netlify build config for the web client (Vite React SPA in web/).
[build]
  base = "web"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback so client-side routes (React Router) resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
